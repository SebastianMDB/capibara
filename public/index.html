<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Capibara Bot</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Capibara Bot</h1>
        <p>Panel de actas por WhatsApp</p>
      </div>
      <form id="token-form" class="token-form">
        <input id="token" type="password" autocomplete="current-password" placeholder="Token admin">
        <button type="submit">Entrar</button>
      </form>
    </header>

    <main class="layout">
      <section class="panel status-panel">
        <div class="panel-title">
          <h2>WhatsApp</h2>
          <span id="wa-state" class="badge">Sin conectar</span>
        </div>
        <div id="qr-box" class="qr-box">
          <span>Esperando QR</span>
        </div>
        <div class="actions">
          <button id="restart-wa" type="button">Reconectar</button>
          <button id="logout-wa" class="danger" type="button">Cerrar sesion</button>
        </div>
      </section>

      <section class="metrics">
        <article>
          <span>Grupos activos</span>
          <strong id="metric-groups">0</strong>
        </article>
        <article>
          <span>Envios</span>
          <strong id="metric-docs">0</strong>
        </article>
        <article>
          <span>Actas hoy</span>
          <strong id="metric-counter">0</strong>
        </article>
        <article>
          <span>Pendientes</span>
          <strong id="metric-pending">0</strong>
          <button id="clear-pending" class="danger compact" type="button">Eliminar pendientes</button>
        </article>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>Proveedor</h2>
        </div>
        <form id="provider-form" class="provider-form">
          <select id="provider-group" name="providerGroupJids" multiple size="5">
            <option value="">Sin grupo proveedor</option>
          </select>
          <textarea id="provider-group-manual" name="providerGroupManual" placeholder="O pega JID de proveedores, uno por linea"></textarea>
          <button id="refresh-groups" type="button">Actualizar grupos</button>
          <button type="submit">Guardar proveedores</button>
        </form>
        <p id="provider-note" class="hint"></p>
        <div id="provider-load" class="provider-load"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>Limites por grupo</h2>
        </div>
        <form id="default-limit-form" class="limit-default-form">
          <label>
            Limite por defecto
            <input id="default-group-limit" type="number" min="0" step="1" placeholder="0 = ilimitado">
          </label>
          <button type="submit">Guardar limite</button>
        </form>
        <form id="group-limit-form" class="group-limit-form">
          <select id="limit-group" name="jid">
            <option value="">Selecciona un grupo</option>
          </select>
          <input id="limit-group-manual" name="jidManual" placeholder="O pega JID del grupo">
          <input id="limit-name" name="name" placeholder="Nombre opcional">
          <input id="limit-value" name="limit" type="number" min="0" step="1" placeholder="Limite propio">
          <input id="limit-used" name="used" type="number" min="0" step="1" placeholder="Usadas">
          <button type="submit">Guardar grupo</button>
        </form>
        <p class="hint">Usa 0 para ilimitado. Deja el limite propio vacio para usar el limite por defecto.</p>
        <div id="group-limits" class="table group-limits"></div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>Envios recientes</h2>
        </div>
        <div id="deliveries" class="table"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
